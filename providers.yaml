# Provider benchmark configuration
#
# Each provider entry defines an OpenAI-compatible API endpoint to benchmark.
# Run with: python run_providers.py [--config providers.yaml]
#
# Environment variables referenced in api_key_env must be set before running.

defaults:
  num_requests: 100
  max_tokens: 256
  model_type: text
  rates: "1,5,10,25,50,100"
  inter_run_wait_seconds: 30

providers:
  # --- Example: local vLLM server ---
  # - name: "local-vllm"
